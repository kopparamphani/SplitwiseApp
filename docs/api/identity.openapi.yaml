openapi: 3.0.3
info:
  title: Identity Service API
  version: 0.1.0
  description: Sign up, log in (email/password + Google), logout, password reset.
paths:
  /auth/signup:
    post:
      summary: Create an account (email + password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, display_name]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                display_name: { type: string }
      responses:
        '201': { description: Account created, logged in }
        '409': { description: Email already used }
        '422': { description: Weak password / bad email }
  /auth/google:
    post:
      summary: Sign up or log in with a Google identity proof
      responses:
        '200': { description: Logged in (existing or new account) }
  /auth/login:
    post:
      summary: Log in with email + password
      responses:
        '200': { description: Session token returned }
        '401': { description: Incorrect credentials }
        '429': { description: Too many tries (lockout) }
  /auth/logout:
    post:
      summary: End the current session
      responses:
        '204': { description: Logged out }
  /auth/reset/request:
    post:
      summary: Ask for a password-reset link (email/password users only)
      responses:
        '202': { description: "If the email exists, a link was sent" }
  /auth/reset/confirm:
    post:
      summary: Set a new password using a reset token
      responses:
        '200': { description: Password changed; old one stops working }
        '410': { description: Link expired or already used }
