openapi: 3.0.3
info:
  title: Identity Service API
  version: 0.1.0
  description: Sign up, log in (email/password + Google), logout, password reset.
paths:
  /auth/signup:
    post:
      summary: Create an account (email + password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, display_name]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                display_name: { type: string }
      responses:
        '201':
          description: >-
            Account created, logged in. Returns an access token (see schema).
            Refresh token is delivered separately via httpOnly Secure cookie (web)
            / secure device storage (mobile), per ADR-0024.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '409': { description: Email already used }
        '422': { description: Weak / known-breached password (ADR-0025) or bad email }
  /auth/google:
    post:
      summary: Sign up or log in with a Google identity proof
      description: >-
        Verifies the Google ID token server-side (audience = our GOOGLE_CLIENT_ID,
        issuer accounts.google.com, signature, expiry) and requires the token's
        email_verified to be true. Then links by verified email: a returning Google
        user or a verified-email match to an existing local account logs in (200);
        a brand-new email creates an account (201). On success, behaves like login —
        returns a TokenResponse and sets the httpOnly Secure refresh cookie, per
        ADR-0024. Linking only ever happens on a provider-verified email (ADR-0024).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token: { type: string, description: Google-issued ID token (JWT) }
      responses:
        '201':
          description: >-
            New account created on first Google sign-in, logged in. Returns an access
            token (see schema). Refresh token rides an httpOnly Secure cookie (web)
            / secure device storage (mobile), per ADR-0024.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '200':
          description: >-
            Logged in to an existing account (returning Google user, or a
            verified-email link to an existing local account). Returns an access
            token; refresh token via httpOnly Secure cookie, per ADR-0024.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401': { description: "Invalid/expired token, Google email not verified, or email already linked to a different Google account" }
        '422': { description: Missing / invalid id_token }
  /auth/login:
    post:
      summary: Log in with email + password
      responses:
        '200':
          description: >-
            Logged in. Returns a short-lived access token (see schema).
            Refresh token is delivered separately via httpOnly Secure cookie (web)
            / secure device storage (mobile), per ADR-0024.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401': { description: Incorrect credentials }
        '429': { description: Too many tries (lockout) }
  /auth/refresh:
    post:
      summary: Get a fresh access token using the refresh-token cookie
      description: >-
        Reads the httpOnly refresh_token cookie. On a valid, non-revoked,
        non-expired session, returns a new access token (TokenResponse). The
        refresh token is ROTATED: the old one is revoked and a new refresh
        token is set as a fresh httpOnly Secure cookie on the response, per
        ADR-0024. No request body — the cookie is the credential.
      responses:
        '200':
          description: >-
            New access token issued; refresh token rotated (new httpOnly Secure
            cookie set on the response).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401': { description: Refresh token missing, invalid, revoked, or expired }
  /auth/logout:
    post:
      summary: End the current session
      responses:
        '204': { description: Logged out }
  /auth/password-reset/request:
    post:
      summary: Ask for a password-reset link
      description: >-
        Constant-time, no enumeration: ALWAYS answers 202, whether or not an
        account exists for that email. If an account exists, we mint a one-time
        token (raw token only in the emailed link; DB stores its sha256 hash),
        set a 1-hour expiry, and fire off the reset email. Never reveals whether
        the email is registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '202': { description: "If an account exists, a reset link was sent (generic — never reveals whether the email exists)" }
        '422': { description: Malformed body (e.g. missing / non-email address) }
  /auth/password-reset/confirm:
    post:
      summary: Set a new password using a reset token
      description: >-
        Consumes the one-time reset token (DB match is by sha256 hash of the raw
        token). Atomic one-time consume — a used token cannot be reused. On
        success the password is changed and ALL of the account's sessions are
        revoked (log out everywhere). The 400 is deliberately generic and covers
        not-found / already-used / expired (1-hour expiry) so nothing leaks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token: { type: string, description: Raw one-time token from the email link }
                new_password: { type: string }
      responses:
        '200': { description: "Password changed; all sessions revoked (log out everywhere)" }
        '400': { description: "Invalid or expired reset link (generic — covers not-found / already-used / expired)" }
        '422': { description: Weak / known-breached new password (ADR-0025) }
components:
  schemas:
    TokenResponse:
      type: object
      description: >-
        Access token for Authorization: Bearer header. The matching refresh token
        is NOT in this body — it rides an httpOnly Secure cookie (web) or secure
        device storage (mobile), per ADR-0024.
      required: [access_token, token_type, expires_in]
      properties:
        access_token: { type: string, description: Short-lived JWT (15 min) }
        token_type: { type: string, enum: [Bearer], example: Bearer }
        expires_in: { type: integer, description: Access-token lifetime in seconds, example: 900 }
